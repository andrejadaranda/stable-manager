        font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
        font-weight: 500;
        font-size: 700px;
      }
    </style>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="#1E3A2A"/>
  <text x="430" y="750" class="lr-mono" text-anchor="middle" fill="#F4ECDF">L</text>
  <circle cx="730" cy="715" r="48" fill="#B5793E"/>
